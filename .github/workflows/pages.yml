name: Deploy The Hot 100

on:
  # Publish design/code changes as soon as they land on main.
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  # Re-publish after the daily data refresh commits a fresh dashboard.json.
  workflow_run:
    workflows: ["Daily NYC Report Heat"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-flight runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
